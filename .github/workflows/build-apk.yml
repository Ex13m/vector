name: Build APK (Capacitor)

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - android/**
      - src/**
      - .github/workflows/build-apk.yml
      - capacitor.config.ts
      - package.json
      - vite.config.ts
      - public/icon*.svg
      - scripts/generate-icons.mjs

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      # ── Node + dependencies ──
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      # ── Generate PNG icons from SVG ──
      - name: Generate PNG icons from SVG
        run: node scripts/generate-icons.mjs

      # ── Build web assets ──
      - name: Build web assets
        run: npm run build

      # ── Capacitor sync (copies dist/ into android/app/src/main/assets/public/) ──
      - name: Capacitor sync
        run: npx cap sync android --inline

      # ── JDK 21 (required by Capacitor 8 / AGP 8.13) ──
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 21

      # ── Android SDK platform 35 ──
      - name: Install Android SDK platform
        run: |
          yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager "platforms;android-36" "build-tools;36.0.0"

      # ── Build debug APK ──
      - name: Build debug APK
        working-directory: android
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon --stacktrace

      - uses: actions/upload-artifact@v7
        with:
          name: vector-debug-apk
          path: android/app/build/outputs/apk/debug/*.apk
          if-no-files-found: error

      # ── Release APK (signed with debug key — for testing) ──
      - name: Build release APK
        working-directory: android
        run: ./gradlew assembleRelease --no-daemon

      - uses: actions/upload-artifact@v7
        with:
          name: vector-release-apk
          path: android/app/build/outputs/apk/release/*.apk
          if-no-files-found: warn
